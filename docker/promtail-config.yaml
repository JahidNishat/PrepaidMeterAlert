server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ── Host app log file ────────────────────────────────────────────────────────
  # The meterbot binary runs on the host, not in Docker.
  # Run the app with: go run . serve 2>> /tmp/meterbot.log
  - job_name: meterbot
    static_configs:
      - targets: [localhost]
        labels:
          service: meterbot
          __path__: /host-tmp/meterbot.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            trace_id: trace_id
            span_id: span_id
      - labels:
          level:
      - structured_metadata:
          trace_id:
          span_id:

  # ── Docker container logs ────────────────────────────────────────────────────
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: '/?(.*)'
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: project
    pipeline_stages:
      - json:
          expressions:
            level: level
            trace_id: trace_id
            span_id: span_id
      - labels:
          level:
      - structured_metadata:
          trace_id:
          span_id:
