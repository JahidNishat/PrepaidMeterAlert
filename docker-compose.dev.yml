services:
  # ─── Database ────────────────────────────────────────────────────────────────
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: meterbot
    ports:
      - "5433:5432"
    volumes:
      - postgres18_data:/var/lib/postgresql
    shm_size: 128mb

  # ─── Telemetry pipeline ───────────────────────────────────────────────────────
  otelcol:
    image: otel/opentelemetry-collector-contrib:0.123.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./docker/otelcol-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC  (app → collector)
      - "4318:4318"   # OTLP HTTP  (optional)
    depends_on:
      - tempo

  prometheus:
    image: prom/prometheus:v3.4.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - otelcol

  tempo:
    image: grafana/tempo:2.8.1
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./docker/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP UI / query API

  loki:
    image: grafana/loki:3.5.0
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./docker/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.5.0
    command: ["-config.file=/etc/promtail/promtail-config.yaml"]
    volumes:
      - ./docker/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /tmp:/host-tmp:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.6.11
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: "grafana-lokiexplore-app,grafana-exploretraces-app,grafana-metricsdrilldown-app"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo
      - loki

volumes:
  postgres18_data:
  prometheus_data:
  tempo_data:
  loki_data:
  grafana_data:
